version: "3.9"
services:
  api:
    build: ./server
    container_name: maccms_api
    env_file: .env
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./server:/app
      - ./server/data:/app/data
    expose:
      - "3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: maccms_web
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped